conky.config = {
    -- Igazítás és elhelyezkedés
    alignment = 'top_right',
    gap_x = 30,
    gap_y = 50,

    -- Ablak tulajdonságok (Vibrálás elleni optimalizáció)
    own_window = true,
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 255,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    
    -- Teljesítmény és pufferelés
    double_buffer = true,
    update_interval = 2.0,
    text_buffer_size = 2048,
    cpu_avg_samples = 2,
    no_buffers = true,

    -- Szöveg megjelenítése (Terminus pixel-perfect beállítás)
    use_xft = true,
    font = 'Hack:size=10',
    xftalpha = 1,
    override_utf8_locale = true,
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,

    -- Színek
    default_color = '#FFFFFF', -- Fehér
    color1 = '#FFE082',        -- Sárga (Címek)
    color2 = '#9FEE62',        -- Zöld
    color3 = '#FF4343',        -- Piros
    color4 = '#1CA9EE',        -- Kék

    -- Méret
    minimum_width = 300,
    maximum_width = 300,
};

conky.text = [[
${alignc}${font Terminus:bold:size=12}${color1}ARCH LINUX${font}${color}
${alignc}${sysname} ${kernel}
${hr 2}

${color4}Üzemidő:${color} ${alignr}$uptime
${color4}RAM:${color} ${alignr}$mem / $memmax ($memperc%)
${color4}SWAP:${color} ${alignr}$swap / $swapmax ($swapperc%)
${color4}${membar 8,300}

${color1}HARDVER ${hr 1}
${color4}CPU hőmérséklet:${color} ${alignr}${execi 10 sensors | grep "id 0" | cut -c 16-20} °C
${color4}GPU hőmérséklet:${color} ${alignr}${execi 10 sensors | grep -E '(temp1|edge)' | tail -n 1 | awk '{print $2}'}
${color4}CPU terhelés:${color} ${alignr}${cpu cpu0}%
#${color4}Entrópia:${color} ${alignr}${entropy_avail} / ${entropy_poolsize}

${color1}TÁROLÓK ${hr 1}
${color4}Rendszer (/):${color} ${alignr}${fs_used /} / ${fs_size /} (${fs_used_perc /}%)
#${color4}Saját (/home):${color} ${alignr}${fs_used /home} / ${fs_size /home} (${fs_used_perc /home}%)

${color1}HÁLÓZAT ${hr 1}
${color4}IP cím:${color} ${alignr}${addr enp3s0}
${color4}Letöltés:${color} ${downspeed enp3s0} ${alignr}${color4}Feltöltés:${color} ${upspeed enp3s0}

${color1}FRISSÍTÉSEK (ARCH) ${hr 1}
${color4}Csomagok:${color} ${alignr}${execi 3600 checkupdates | wc -l} db frissíthető

${color1}MÉDIA ${hr 1}
${if_match "${execi 5 playerctl status 2>/dev/null}" != ""}
${color4}Előadó:${color} ${alignr}${execi 20 playerctl metadata artist | cut -c 1-35}
${color4}Cím:${color}
${execi 20 playerctl metadata title | cut -c 1-40}
${execi 20 playerctl metadata title | cut -c 41-80}
${else}
${alignc}${color grey}Nincs aktív lejátszás${color}
${endif}

${color1}IDŐJÁRÁS ${hr 1}
${if_existing /home/drszigetib/.cache/weather.txt}
${color4}Város:${color} ${alignr}${execi 60 cat ~/.cache/weather.txt | grep city | cut -d">" -f2}
${color4}Hőmérséklet:${color} ${alignr}${execi 60 cat ~/.cache/weather.txt | grep temp | cut -d">" -f2} °C
${color4}Égbolt:${color} ${alignr}${execi 60 cat ~/.cache/weather.txt | grep description | cut -d">" -f2 | cut -c 1-30}
${else}
${alignc}${color3}Időjárás adatok betöltése...${color}
${endif}

${color1}EGYÉB ${hr 1}
${color4}Vakáció:${color2}${alignr}${execi 600 ~/szenteste.sh}
${color4}Iskolai hét:${color}${alignr}${execi 600 ~/abhet.sh}
${color4}Peti órarend:${color}${alignr}${execi 600 ~/orarend.sh}
]];
